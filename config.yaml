  min_score: 65
  fallback_min_score: 50

retention_days:
  weak: 30
  all_new: 90

guards:
  max_new_per_run: 4000
  max_db_mb: 200
  vacuum_every_runs: 30

sources:
  remotive:
    enabled: true
    urls:
      - "https://remotive.com/api/remote-jobs?category=software-dev"
      - "https://remotive.com/api/remote-jobs?search=automation"
  remoteok:
    enabled: true
    url: "https://remoteok.com/api"
  wwr:
    enabled: true
    feeds:
      - "https://weworkremotely.com/categories/remote-programming-jobs.rss"
      - "https://weworkremotely.com/categories/remote-devops-sysadmin-jobs.rss"
      - "https://weworkremotely.com/categories/all-other-remote-jobs.rss"
  himalayas:
    enabled: true
    urls:
      - "https://himalayas.app/jobs/api?limit=100"
  jobicy:
    enabled: true
    urls:
      - "https://jobicy.com/api/v2/remote-jobs?count=50&industry=dev"
      - "https://jobicy.com/api/v2/remote-jobs?count=50&tag=automation"
  arbeitnow:
    enabled: true
    urls:
      - "https://www.arbeitnow.com/api/job-board-api"
  jobscollider:
    enabled: true
    feeds:
      - "https://jobscollider.com/remote-jobs.rss"
  jobspresso:
    enabled: true
    feeds:
      - "https://jobspresso.co/feed/?post_type=job_listing"

  landingjobs:
    enabled: false         # 403 Forbidden: blocks programmatic access, disabled 2026-07-09
    urls:
      - "https://landing.jobs/api/v1/jobs"
  workingnomads:
    enabled: true
    urls:
      - "https://www.workingnomads.com/api/exposed_jobs/"
  freelancer:
    enabled: false          # freelance/contract gigs, not employment; flip to true to include
    feeds:
      - "https://www.freelancer.com/rss.xml"
  # --- ATS company boards (task 1B) -------------------------------------------
  # Add a company: find its careers URL and map it to an ats + slug:
  #   boards.greenhouse.io/<slug>       -> { ats: greenhouse, slug: <slug> }
  #   jobs.lever.co/<slug>              -> { ats: lever, slug: <slug> }
  #   jobs.ashbyhq.com/<slug>           -> { ats: ashby, slug: <slug> }
  #   <slug>.recruitee.com              -> { ats: recruitee, slug: <slug> }
  #   jobs.smartrecruiters.com/<slug>   -> { ats: smartrecruiters, slug: <slug> }
  #   <slug>.breezy.hr                  -> { ats: breezy, slug: <slug> }
  # Slugs below are best-guess starters; dead/unknown slugs are logged & skipped.
  ats:
    enabled: true
    companies:
      - { ats: greenhouse, slug: remotecom, name: "Remote.com" }
      - { ats: ashby, slug: notion, name: "Notion" }
      - { ats: ashby, slug: zapier, name: "Zapier" }
      - { ats: ashby, slug: ramp, name: "Ramp" }
      - { ats: ashby, slug: linear, name: "Linear" }
      - { ats: ashby, slug: vanta, name: "Vanta" }
      - { ats: ashby, slug: retool, name: "Retool" }
      - { ats: ashby, slug: clay, name: "Clay" }
      - { ats: ashby, slug: mercury, name: "Mercury" }
      - { ats: ashby, slug: replit, name: "Replit" }
      - { ats: lever, slug: storyprotocol, name: "Story Protocol" }
      # --- mined from RU-founder Telegram channels (slugs confirmed via live apply-links) ---
      - { ats: ashby, slug: ruby-labs, name: "Ruby Labs" }
      - { ats: ashby, slug: kiefer, name: "Kiefer" }
      - { ats: greenhouse, slug: miro, name: "Miro" }
      - { ats: greenhouse, slug: agoda, name: "Agoda" }
      - { ats: greenhouse, slug: anthropic, name: "Anthropic" }
      - { ats: workable, slug: vivid-money, name: "Vivid Money" }

# Scoring adjustments (task 1): strong downweight, NOT a hard cut.
seniority_mismatch_penalty: 30   # senior/lead/principal/head/... points subtracted
remote_probably_penalty: 20      # remote only "probably" -> points subtracted + flagged
# Telegram channel mining (task 1B): runs automatically every pipeline run.
# Each run fetches public t.me/s/<channel> previews, extracts hosted-ATS apply
# links, and feeds discovered companies into the ATS collector (union with the
# static companies list below). `python -m tools.mine_telegram` still works as a
# manual preview. Set enabled:false to turn auto-mining off.
telegram_mine:
  enabled: true
  channels:
    - zarubezhom_jobs      # Connectable Jobs — RU-founder companies abroad
    - geekjobs             # Job in IT&Digital (geekjob.ru)

off_domain_penalty: 25           # HR/payroll/recruiting titles -> strong downweight (kept, not cut)
off_domain_terms:                # matched against TITLE only (precise; avoids JD false positives)
  - payroll
  - benefits
  - recruiting
  - "talent acquisition"
  - "hr operations"
  - "people operations"
  - "onboarding operations"
  - hris
